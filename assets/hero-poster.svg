  <text x="800" y="665" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="112" font-weight="900" letter-spacing="17" fill="#54cfff">OFERTAS</text>
  <text x="800" y="748" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="30" font-weight="700" letter-spacing="10" fill="#dbeafe">GRUPO VIP</text>
</svg>
