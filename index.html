<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Zênite Ofertas | Grupo VIP de Ofertas no WhatsApp</title>
  <meta name="description" content="Entre no Grupo VIP da Zênite Ofertas e receba ofertas reais direto no WhatsApp." />
  <meta name="robots" content="index, follow" />
  <meta name="theme-color" content="#020817" />
  <style>
    :root{
      --bg:#020817;
      --text:#ffffff;
      --soft:#dbeafe;
      --muted:#a8b7d6;
      --cyan:#54cfff;
      --green:#25d366;
      --yellow:#ffc928;
      --yellow2:#e5aa00;
      --font:Inter,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",Arial,sans-serif;
    }

    *{box-sizing:border-box;margin:0;padding:0}
    html{scroll-behavior:smooth}
    body{min-height:100vh;font-family:var(--font);background:var(--bg);color:var(--text);overflow-x:hidden;-webkit-font-smoothing:antialiased;text-rendering:optimizeLegibility}
    a{color:inherit;text-decoration:none}

    .hero{
      position:relative;
      min-height:100vh;
      display:flex;
      align-items:center;
      overflow:hidden;
      background:#020817;
      isolation:isolate;
    }

    .hero-video{
      position:absolute;
      inset:0;
      width:100%;
      height:100%;
      object-fit:cover;
      object-position:center;
      z-index:0;
      transform:scale(1.012);
      filter:saturate(1.08) contrast(1.04) brightness(.98);
    }

    .hero-overlay{
      position:absolute;
      inset:0;
      z-index:1;
      pointer-events:none;
      background:
        linear-gradient(90deg,rgba(2,8,23,.86) 0%,rgba(2,8,23,.68) 27%,rgba(2,8,23,.32) 54%,rgba(2,8,23,.08) 100%),
        linear-gradient(180deg,rgba(2,8,23,.10) 0%,rgba(2,8,23,.34) 100%);
    }

    .gemini-mask{
      position:absolute;
      right:-60px;
      bottom:-70px;
      z-index:1;
      width:min(34vw,430px);
      height:min(28vw,330px);
      pointer-events:none;
      background:radial-gradient(ellipse at 70% 70%,rgba(2,8,23,.98) 0%,rgba(2,8,23,.86) 28%,rgba(2,8,23,.46) 55%,transparent 78%);
    }

    .content{
      position:relative;
      z-index:2;
      width:100%;
      max-width:1220px;
      margin:0 auto;
      padding:clamp(28px,5vw,72px);
      display:grid;
      grid-template-columns:minmax(300px,430px) 1fr;
      gap:clamp(36px,7vw,120px);
      align-items:center;
    }

    .copy{
      width:100%;
      padding-left:clamp(0px,1.5vw,20px);
    }

    .brand{
      display:inline-flex;
      align-items:center;
      gap:12px;
      margin-bottom:clamp(22px,3.5vw,38px);
    }

    .brand img{
      width:50px;
      height:50px;
      border-radius:50%;
      object-fit:cover;
      border:1px solid rgba(255,255,255,.18);
      box-shadow:0 0 26px rgba(84,207,255,.34);
    }

    .brand strong{
      display:block;
      color:#fff;
      font-size:.94rem;
      line-height:1;
      font-weight:900;
      letter-spacing:.02em;
    }

    .brand small{
      display:block;
      margin-top:6px;
      color:var(--cyan);
      font-size:.6rem;
      line-height:1;
      font-weight:900;
      letter-spacing:.16em;
      text-transform:uppercase;
    }

    .badge{
      width:max-content;
      min-height:31px;
      display:inline-flex;
      align-items:center;
      gap:8px;
      padding:0 12px;
      border-radius:999px;
      background:rgba(84,207,255,.12);
      border:1px solid rgba(84,207,255,.30);
      color:#eaf9ff;
      font-size:.64rem;
      font-weight:900;
      letter-spacing:.08em;
      text-transform:uppercase;
      backdrop-filter:blur(10px);
    }

    .badge::before{
      content:"";
      width:7px;
      height:7px;
      border-radius:50%;
      background:var(--green);
      box-shadow:0 0 0 5px rgba(37,211,102,.14);
    }

    h1{
      max-width:405px;
      margin-top:18px;
      color:#fff;
      font-size:clamp(1.86rem,3.75vw,3.05rem);
      line-height:1.1;
      letter-spacing:-.04em;
      font-weight:900;
    }

    h1 span{color:var(--cyan)}

    .support-text{
      max-width:390px;
      margin-top:18px;
      color:var(--soft);
      font-size:clamp(.9rem,1.08vw,1rem);
      line-height:1.68;
    }

    .actions{
      display:flex;
      flex-wrap:wrap;
      gap:12px;
      margin-top:26px;
    }

    .btn{
      min-height:46px;
      display:inline-flex;
      align-items:center;
      justify-content:center;
      border-radius:13px;
      padding:0 22px;
      font-size:.9rem;
      font-weight:900;
      text-align:center;
      transition:.2s ease;
      border:1px solid transparent;
      backdrop-filter:blur(10px);
    }

    .btn-primary{background:linear-gradient(180deg,var(--yellow),var(--yellow2));color:#07101f;box-shadow:0 16px 34px rgba(255,201,40,.20)}
    .btn-whatsapp{background:rgba(37,211,102,.88);color:#fff;box-shadow:0 16px 34px rgba(37,211,102,.20)}
    .btn:hover,.btn:focus-visible{transform:translateY(-2px);outline:3px solid rgba(84,207,255,.22)}

    .note{
      max-width:330px;
      margin-top:13px;
      color:rgba(219,234,254,.72);
      font-size:.73rem;
      line-height:1.45;
    }

    .hero-space{
      min-height:66vh;
      pointer-events:none;
    }

    @media(max-width:900px){
      .hero{align-items:flex-end}
      .content{grid-template-columns:1fr;padding:24px 18px 42px;gap:0}
      .copy{max-width:420px;padding-left:0}
      .hero-space{display:none}
      .hero-overlay{background:linear-gradient(180deg,rgba(2,8,23,.18) 0%,rgba(2,8,23,.84) 100%)}
      .gemini-mask{display:none}
      h1{max-width:395px;font-size:clamp(1.9rem,9.5vw,2.8rem)}
      .support-text{max-width:390px}
      .actions{display:grid;grid-template-columns:1fr;width:100%;max-width:390px}
      .btn{width:100%}
    }

    @media(max-width:520px){
      .brand img{width:46px;height:46px}
      .brand strong{font-size:.88rem}
      .brand small{font-size:.56rem}
      .badge{font-size:.6rem}
      h1{letter-spacing:-.035em}
    }

    @media(prefers-reduced-motion:reduce){html{scroll-behavior:auto}*{transition:none!important}}
  </style>
</head>
<body>
  <main class="hero" aria-labelledby="hero-title">
    <video class="hero-video" id="heroVideo" autoplay muted loop playsinline preload="auto" poster="assets/zenite-logo.webp">
      <source src="video.mp4" type="video/mp4" />
    </video>

    <div class="hero-overlay" aria-hidden="true"></div>
    <div class="gemini-mask" aria-hidden="true"></div>

    <section class="content">
      <div class="copy">
        <a class="brand" href="#" aria-label="Zênite Ofertas">
          <img src="assets/zenite-logo.webp" alt="Logo da Zênite Ofertas" width="50" height="50" />
          <span><strong>ZÊNITE OFERTAS</strong><small>Grupo VIP</small></span>
        </a>

        <div class="badge">Entrada gratuita</div>
        <h1 id="hero-title">Receba <span>ofertas reais</span> no WhatsApp</h1>
        <p class="support-text">Cadastre-se e entre no Grupo VIP da Zênite Ofertas para acompanhar promoções antes que acabem.</p>

        <div class="actions">
          <a class="btn btn-primary" href="https://chat.whatsapp.com/Jc7FGLbhWA60NdfPItyGz5?mode=gi_t" target="_blank" rel="noopener noreferrer">Entrar no grupo</a>
          <a class="btn btn-whatsapp" href="https://chat.whatsapp.com/Jc7FGLbhWA60NdfPItyGz5?mode=gi_t" target="_blank" rel="noopener noreferrer">WhatsApp</a>
        </div>

        <p class="note">Acesso gratuito ao grupo oficial de ofertas.</p>
      </div>

      <div class="hero-space" aria-hidden="true"></div>
    </section>
  </main>

  <script>
    const video = document.getElementById('heroVideo');

    async function carregarVideoDoGitHubSeNecessario(){
      const partes = ['assets/hero-video-01.b64','assets/hero-video-02.b64','assets/hero-video-03.b64','assets/hero-video-04.b64','assets/hero-video-05.b64'];
      try{
        const textos = await Promise.all(partes.map((p)=>fetch(p,{cache:'force-cache'}).then((r)=>r.ok?r.text():'')));
        const b64 = textos.join('').replace(/\s+/g,'');
        if(!b64) return;
        const bin = atob(b64);
        const bytes = new Uint8Array(bin.length);
        for(let i=0;i<bin.length;i++) bytes[i] = bin.charCodeAt(i);
        video.src = URL.createObjectURL(new Blob([bytes],{type:'video/mp4'}));
        video.muted = true;
        video.defaultMuted = true;
        video.play().catch(()=>{});
      }catch(error){console.warn('Vídeo de fundo não carregado.', error)}
    }

    video.addEventListener('error', carregarVideoDoGitHubSeNecessario, { once:true });
    setTimeout(()=>{ if(!video.currentSrc || video.readyState === 0) carregarVideoDoGitHubSeNecessario(); }, 700);
  </script>
</body>
</html>
