<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Zênite Ofertas | Grupo VIP de Ofertas no WhatsApp</title>
  <meta name="description" content="Entre no Grupo VIP da Zênite Ofertas e receba ofertas reais direto no WhatsApp." />
  <meta name="robots" content="index, follow" />
  <meta name="theme-color" content="#020817" />
  <style>
    :root{
      --bg:#020817;
      --text:#ffffff;
      --soft:#dbeafe;
      --muted:#a8b7d6;
      --cyan:#54cfff;
      --green:#25d366;
      --yellow:#ffc928;
      --yellow-2:#e5aa00;
      --font:Inter,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",Arial,sans-serif;
    }
    *{box-sizing:border-box;margin:0;padding:0}
    html{scroll-behavior:smooth}
    body{min-height:100vh;font-family:var(--font);background:var(--bg);color:var(--text);overflow-x:hidden;-webkit-font-smoothing:antialiased;text-rendering:optimizeLegibility}
    a{color:inherit;text-decoration:none}
    .hero{position:relative;min-height:100vh;overflow:hidden;display:flex;align-items:center;background:#020817}
    .hero-video{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;object-position:center;z-index:0;transform:scale(1.01);filter:saturate(1.08) contrast(1.04) brightness(.98)}
    .hero-overlay{position:absolute;inset:0;z-index:1;pointer-events:none;background:linear-gradient(90deg,rgba(2,8,23,.82) 0%,rgba(2,8,23,.58) 33%,rgba(2,8,23,.24) 66%,rgba(2,8,23,.10) 100%),linear-gradient(180deg,rgba(2,8,23,.12) 0%,rgba(2,8,23,.42) 100%)}
    .content{position:relative;z-index:2;width:100%;max-width:1180px;margin:0 auto;padding:clamp(26px,5vw,70px);display:grid;grid-template-columns:minmax(300px,460px) 1fr;align-items:center;gap:clamp(28px,5vw,80px)}
    .copy{width:100%;align-self:center;padding-left:clamp(0px,1.4vw,18px)}
    .brand{display:inline-flex;align-items:center;gap:12px;margin-bottom:clamp(20px,3vw,34px)}
    .brand img{width:52px;height:52px;border-radius:50%;object-fit:cover;border:1px solid rgba(255,255,255,.18);box-shadow:0 0 28px rgba(84,207,255,.32)}
    .brand strong{display:block;color:#fff;font-size:.96rem;line-height:1;font-weight:900;letter-spacing:.02em}
    .brand small{display:block;margin-top:6px;color:var(--cyan);font-size:.62rem;line-height:1;font-weight:900;letter-spacing:.16em;text-transform:uppercase}
    .badge{width:max-content;min-height:32px;display:inline-flex;align-items:center;gap:8px;padding:0 12px;border-radius:999px;background:rgba(84,207,255,.12);border:1px solid rgba(84,207,255,.30);color:#eaf9ff;font-size:.67rem;font-weight:900;letter-spacing:.08em;text-transform:uppercase;backdrop-filter:blur(10px)}
    .badge:before{content:"";width:7px;height:7px;border-radius:50%;background:var(--green);box-shadow:0 0 0 5px rgba(37,211,102,.14)}
    h1{max-width:440px;margin-top:18px;color:#fff;font-size:clamp(2rem,4.05vw,3.35rem);line-height:1.08;letter-spacing:-.045em;font-weight:900}
    h1 span{color:var(--cyan)}
    .support-text{max-width:430px;margin-top:18px;color:var(--soft);font-size:clamp(.95rem,1.15vw,1.05rem);line-height:1.68}
    .actions{display:flex;flex-wrap:wrap;gap:12px;margin-top:26px}
    .btn{min-height:48px;display:inline-flex;align-items:center;justify-content:center;border-radius:13px;padding:0 22px;font-size:.92rem;font-weight:900;text-align:center;transition:.2s ease;border:1px solid transparent;backdrop-filter:blur(10px)}
    .btn-primary{background:linear-gradient(180deg,var(--yellow),var(--yellow-2));color:#07101f;box-shadow:0 16px 34px rgba(255,201,40,.20)}
    .btn-whatsapp{background:rgba(37,211,102,.88);color:#fff;box-shadow:0 16px 34px rgba(37,211,102,.20)}
    .btn:hover,.btn:focus-visible{transform:translateY(-2px);outline:3px solid rgba(84,207,255,.22)}
    .note{max-width:360px;margin-top:14px;color:rgba(219,234,254,.72);font-size:.76rem;line-height:1.45}
    .video-space{min-height:64vh;pointer-events:none}
    @media(max-width:900px){.hero{align-items:flex-end}.content{grid-template-columns:1fr;padding:24px 18px 42px;gap:0}.copy{max-width:460px;padding-left:0}.video-space{display:none}.hero-overlay{background:linear-gradient(180deg,rgba(2,8,23,.16) 0%,rgba(2,8,23,.82) 100%)}h1{font-size:clamp(2rem,10vw,3.05rem);max-width:430px}.support-text{max-width:420px}.actions{display:grid;grid-template-columns:1fr;width:100%;max-width:420px}.btn{width:100%}}
    @media(max-width:520px){.brand img{width:48px;height:48px}.brand strong{font-size:.9rem}.brand small{font-size:.58rem}.badge{font-size:.62rem}h1{letter-spacing:-.04em}}
    @media(prefers-reduced-motion:reduce){html{scroll-behavior:auto}*{transition:none!important}}
  </style>
</head>
<body>
  <main class="hero" aria-labelledby="hero-title">
    <video class="hero-video" id="heroVideo" autoplay muted loop playsinline preload="auto" poster="assets/zenite-logo.webp">
      <source src="video.mp4" type="video/mp4" />
    </video>
    <div class="hero-overlay" aria-hidden="true"></div>
    <section class="content">
      <div class="copy">
        <a class="brand" href="#" aria-label="Zênite Ofertas">
          <img src="assets/zenite-logo.webp" alt="Logo da Zênite Ofertas" width="52" height="52" />
          <span><strong>ZÊNITE OFERTAS</strong><small>Grupo VIP</small></span>
        </a>
        <div class="badge">Entrada gratuita</div>
        <h1 id="hero-title">Receba <span>ofertas reais</span> no WhatsApp</h1>
        <p class="support-text">Cadastre-se e entre no Grupo VIP da Zênite Ofertas para acompanhar promoções antes que acabem.</p>
        <div class="actions">
          <a class="btn btn-primary" href="https://chat.whatsapp.com/Jc7FGLbhWA60NdfPItyGz5?mode=gi_t" target="_blank" rel="noopener noreferrer">Entrar no grupo</a>
          <a class="btn btn-whatsapp" href="https://chat.whatsapp.com/Jc7FGLbhWA60NdfPItyGz5?mode=gi_t" target="_blank" rel="noopener noreferrer">WhatsApp</a>
        </div>
        <p class="note">Acesso gratuito ao grupo oficial de ofertas.</p>
      </div>
      <div class="video-space" aria-hidden="true"></div>
    </section>
  </main>
  <script>
    const video = document.getElementById('heroVideo');
    async function carregarVideoDoGitHubSeNecessario(){
      const partes = ['assets/hero-video-01.b64','assets/hero-video-02.b64','assets/hero-video-03.b64','assets/hero-video-04.b64','assets/hero-video-05.b64'];
      try{
        const textos = await Promise.all(partes.map((p)=>fetch(p,{cache:'force-cache'}).then((r)=>r.ok?r.text():'')));
        const b64 = textos.join('').replace(/\s+/g,'');
        if(!b64) return;
        const bin = atob(b64);
        const bytes = new Uint8Array(bin.length);
        for(let i=0;i<bin.length;i++) bytes[i] = bin.charCodeAt(i);
        video.src = URL.createObjectURL(new Blob([bytes],{type:'video/mp4'}));
        video.muted = true;
        video.defaultMuted = true;
        video.play().catch(()=>{});
      }catch(error){console.warn('Vídeo de fundo não carregado.', error)}
    }
    video.addEventListener('error', carregarVideoDoGitHubSeNecessario, { once:true });
    setTimeout(()=>{ if(!video.currentSrc || video.readyState === 0) carregarVideoDoGitHubSeNecessario(); }, 700);
  </script>
</body>
</html>
