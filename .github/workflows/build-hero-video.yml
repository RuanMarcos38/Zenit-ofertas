name: Build Hero Video

on:
  pull_request:
    branches:
      - main
    paths:
      - '.github/hero-video-trigger'
      - '.github/workflows/build-hero-video.yml'
      - 'assets/hero-upload-*.b64'
      - 'assets/hero-video-*.b64'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: build-hero-video-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: false

jobs:
  build-video:
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    steps:
      - name: Checkout pull request branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref || github.ref_name }}
          fetch-depth: 0

      - name: Rebuild Hero MP4 from repository chunks
        shell: python
        run: |
          from pathlib import Path
          import base64
          import re

          asset_dir = Path('assets')
          candidates = [
              [asset_dir / f'hero-upload-{index:02d}.b64' for index in range(1, 11)],
              [asset_dir / f'hero-video-{index:02d}.b64' for index in range(1, 6)],
          ]

          valid_videos = []

          for files in candidates:
              if not all(path.is_file() for path in files):
                  print('Skipping incomplete chunk set:', [str(path) for path in files])
                  continue

              print('Trying chunk set:', [path.name for path in files])
              encoded = ''.join(
                  re.sub(r'\s+', '', path.read_text(encoding='utf-8-sig'))
                  for path in files
              )
              encoded += '=' * (-len(encoded) % 4)

              try:
                  video = base64.b64decode(encoded, validate=False)
              except Exception as error:
                  print('Decode failed:', error)
                  continue

              if len(video) >= 100_000 and video[4:8] == b'ftyp':
                  valid_videos.append(video)
                  print(f'Valid MP4 candidate: {len(video):,} bytes')
              else:
                  print(f'Invalid candidate: {len(video):,} bytes')

          if not valid_videos:
              raise SystemExit('No valid MP4 could be reconstructed from repository chunks.')

          video = max(valid_videos, key=len)
          output = asset_dir / 'hero-video.mp4'
          output.write_bytes(video)
          print(f'Generated {output} with {len(video):,} bytes.')

      - name: Commit generated MP4 to pull request branch
        run: |
          if git diff --quiet -- assets/hero-video.mp4; then
            echo 'Hero video is already up to date.'
            exit 0
          fi
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add assets/hero-video.mp4
          git commit -m 'Build Hero video MP4'
          git push origin HEAD:${{ github.head_ref || github.ref_name }}
