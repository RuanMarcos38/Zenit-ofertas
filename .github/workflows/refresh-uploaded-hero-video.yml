name: Refresh Uploaded Hero Video

on:
  pull_request:
    branches:
      - main
    paths:
      - '.github/refresh-uploaded-video-trigger'
      - '.github/workflows/refresh-uploaded-hero-video.yml'

permissions:
  contents: write

jobs:
  refresh-video:
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    steps:
      - name: Checkout pull request branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0

      - name: Restore clean page and refresh fullscreen background video
        shell: python
        run: |
          from pathlib import Path
          import re
          import subprocess

          html_path = Path('index.html')
          video_path = Path('assets/hero-video.mp4')

          if not video_path.is_file() or video_path.stat().st_size < 100_000:
              raise SystemExit('assets/hero-video.mp4 is missing or invalid')

          video = video_path.read_bytes()
          if video[4:8] != b'ftyp':
              raise SystemExit('assets/hero-video.mp4 is not a valid MP4')

          clean_html = subprocess.check_output(
              ['git', 'show', 'origin/main:index.html'],
              text=True,
              encoding='utf-8',
          )

          html = re.sub(
              r'assets/hero-video\.mp4\?v=[A-Za-z0-9._-]+',
              'assets/hero-video.mp4?v=20260723-upload-10',
              clean_html,
          )

          required = [
              'class="page-background-video"',
              'autoplay',
              'muted',
              'loop',
              'playsinline',
              'pointer-events: none',
              'object-fit: cover',
          ]
          missing = [item for item in required if item not in html]
          if missing:
              raise SystemExit(f'Missing background video requirements: {missing}')

          if 'VIDEO_PARTS = Array.from' not in html:
              raise SystemExit('The fallback video logic was unexpectedly removed')

          html_path.write_text(html, encoding='utf-8')
          print(f'Validated MP4: {video_path.stat().st_size:,} bytes')

      - name: Commit refreshed cache version
        run: |
          if git diff --quiet -- index.html; then
            echo 'The uploaded reference video is already configured.'
            exit 0
          fi
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add index.html
          git commit -m 'Usa o vídeo enviado como background da Hero'
          git push origin HEAD:${{ github.head_ref }}
